name: video_player_app
description: A personal video player for Android with gesture controls, resume playback, and season-based theming.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Simpler video player - less configuration needed
  video_player: ^2.8.2
  
  # File access for videos
  photo_manager: ^3.2.0

  # Persist theme choice and resume position
  shared_preferences: ^2.2.2

  # Share videos
  share_plus: ^7.2.2

  # State management
  provider: ^6.1.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
