name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Scaffold native Android project
        run: |
          flutter create --platforms=android --org com.example.videoplayer --project-name video_player_app _scaffold
          cp -r _scaffold/android ./android
          rm -rf _scaffold

      - name: Update Android SDK to 36
        run: |
          # Update compileSdk to 36
          sed -i 's/compileSdk 33/compileSdk 36/g' android/app/build.gradle
          sed -i 's/compileSdkVersion 33/compileSdkVersion 36/g' android/app/build.gradle
          # Also update targetSdk if needed
          sed -i 's/targetSdk 33/targetSdk 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion 33/targetSdkVersion 34/g' android/app/build.gradle

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Add required permissions to AndroidManifest.xml
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - "$MANIFEST" << 'PYEOF'
          import sys
          path = sys.argv[1]
          with open(path, "r") as f:
              content = f.read()

          permissions = (
              '    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n'
              '    <uses-permission android:name="android.permission.R
