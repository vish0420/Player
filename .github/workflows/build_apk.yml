name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Scaffold native Android project
        run: |
          flutter create --platforms=android --org com.example.videoplayer --project-name video_player_app _scaffold
          cp -r _scaffold/android ./android
          rm -rf _scaffold

      - name: Update Android SDK to 36
        run: |
          python3 << 'PYEOF'
          import os
          import re
          
          # Find build.gradle file
          build_gradle_path = None
          for root, dirs, files in os.walk('android'):
              for file in files:
                  if file == 'build.gradle':
                      build_gradle_path = os.path.join(root, file)
                      print(f"Found: {build_gradle_path}")
                      break
              if build_gradle_path:
                  break
          
          if not build_gradle_path:
              print("ERROR: build.gradle not found!")
              exit(1)
          
          # Read and update
          with open(build_gradle_path, 'r') as f:
              content = f.read()
          
          # Replace compileSdk versions
          content = re.sub(r'compileSdk\s+\d+', 'compileSdk 36', content)
          content = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 36', content)
          
          # Replace targetSdk versions
          content = re.sub(r'targetSdk\s+\d+', 'targetSdk 34', content)
          content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', content)
          
          # Write back
          with open(build_gradle_path, 'w') as f:
              f.write(content)
          
          print("✓ Updated successfully!")
          PYEOF

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Add required permissions to AndroidManifest.xml
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - "$MANIFEST" << 'PYEOF'
          import sys
          path = sys.argv[1]
          with open(path, "r") as f:
              content = f.read()

          permissions = (
              '    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n'
              '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n'
              '    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>\n'
              '    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n'
          )

          insert_at = content.index(">", content.index("<manifest")) + 1
          content = content[:insert_at] + "\n" + permissions + content[insert_at:]

          with open(path, "w") as f:
              f.write(content)
          PYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-player-apk
          path: build/app/outputs/flutter-apk/app-release.apk
